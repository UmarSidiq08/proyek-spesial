<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Aisha 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --blush:     #f4a7b9;
            --rose:      #e8738a;
            --deep-rose: #c94b6d;
            --petal:     #fce4ec;
            --cream:     #fff5f7;
            --dusty:     #d4849a;
            --text-dark: #3a1a24;
            --text-mid:  #7a4a58;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            overflow: hidden;
            height: 100vh;
            cursor: none;
            display: flex;
            flex-direction: column;
        }

        /* Cursor */
        .cursor {
            position: fixed; width: 12px; height: 12px;
            background: var(--rose); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform .15s ease, background .2s;
            mix-blend-mode: multiply;
        }
        .cursor-ring {
            position: fixed; width: 36px; height: 36px;
            border: 1.5px solid var(--blush); border-radius: 50%;
            pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform .35s ease, width .3s, height .3s, border-color .2s;
        }

        /* Curtain */
        .curtain {
            position: fixed; inset:0; z-index: 200;
            background: linear-gradient(135deg, var(--rose), var(--deep-rose));
            transform: scaleY(1); transform-origin: top; pointer-events: none;
        }
        .curtain.opening { animation: curtainOpen .55s .1s cubic-bezier(.76,0,.24,1) forwards; }
        .curtain.closing { transform: scaleY(0); transform-origin: bottom; animation: curtainClose .55s cubic-bezier(.76,0,.24,1) forwards; }
        @keyframes curtainOpen  { from{transform:scaleY(1)} to{transform:scaleY(0)} }
        @keyframes curtainClose { from{transform:scaleY(0)} to{transform:scaleY(1)} }

        /* Nav */
        .nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.4rem 2.5rem;
            background: rgba(255,245,247,.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid #f4c2ce44; z-index: 10;
            flex-shrink: 0;
        }
        .nav-logo {
            font-family:'Cormorant Garamond',serif;
            font-size:1.6rem; font-style:italic; font-weight:300; color:var(--text-dark);
        }
        .nav-logo span { color: var(--rose); }
        .nav-actions { display:flex; gap:.75rem; align-items:center; }
        .logout-btn {
            padding:.55rem 1.4rem; border-radius:100px; border:none;
            background:linear-gradient(135deg,var(--blush),var(--rose));
            color:white; font-size:.85rem; cursor:none;
            transition:all .2s; font-family:'DM Sans',sans-serif;
            box-shadow:0 3px 12px rgba(232,115,138,.3);
        }
        .logout-btn:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(232,115,138,.45); }

        /* Gallery body */
        .gallery-body {
            flex: 1; overflow-y: auto;
            padding: 2.5rem 2.5rem 3rem; background: var(--cream);
        }
        .gallery-body::-webkit-scrollbar { width:6px; }
        .gallery-body::-webkit-scrollbar-track { background:transparent; }
        .gallery-body::-webkit-scrollbar-thumb { background:var(--blush); border-radius:3px; }

        .gallery-header {
            margin-bottom:2.5rem; opacity:0; transform:translateY(20px);
            animation:fadeUp .7s .15s forwards;
        }
        .gallery-header h2 {
            font-family:'Cormorant Garamond',serif;
            font-size:clamp(2rem,4vw,3rem); font-weight:300; font-style:italic; color:var(--text-dark);
        }
        .gallery-header p { color:var(--text-mid); font-size:.9rem; margin-top:.4rem; font-weight:300; }
        .header-line { width:60px; height:2px; background:linear-gradient(to right,var(--rose),var(--blush)); border-radius:2px; margin-top:.8rem; }

        /* Album grid */
        .album-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:1.4rem; }

        .album-card {
            border-radius:18px; overflow:hidden; background:white;
            box-shadow:0 4px 20px rgba(201,75,109,.08);
            cursor:none;
            transition:transform .3s ease, box-shadow .3s ease;
            opacity:0; transform:translateY(24px); animation:fadeUp .6s forwards;
        }
        .album-card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 16px 40px rgba(201,75,109,.18); }
        .album-card:active { transform:scale(.98); }

        .album-thumb {
            width:100%; aspect-ratio:4/3;
            display:flex; align-items:center; justify-content:center;
            font-size:3.5rem; position:relative; overflow:hidden;
        }
        .album-thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.08)); }

        .album-thumb-overlay {
            position:absolute; inset:0; z-index:2;
            display:flex; align-items:center; justify-content:center;
            background:rgba(232,115,138,0); transition:background .3s;
        }
        .album-card:hover .album-thumb-overlay { background:rgba(232,115,138,.18); }
        .album-thumb-overlay span {
            font-size:.85rem; font-family:'DM Sans',sans-serif; font-weight:500;
            color:white; letter-spacing:.08em; text-transform:uppercase;
            opacity:0; transform:translateY(6px); transition:opacity .3s, transform .3s;
            text-shadow:0 1px 8px rgba(0,0,0,.2);
        }
        .album-card:hover .album-thumb-overlay span { opacity:1; transform:translateY(0); }

        .album-info { padding:1.1rem 1.3rem 1.3rem; }
        .album-info h3 { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:400; color:var(--text-dark); margin-bottom:.2rem; }
        .album-info p  { font-size:.78rem; color:var(--dusty); font-weight:400; }

        .album-card:nth-child(1){ animation-delay:.1s }
        .album-card:nth-child(2){ animation-delay:.2s }

        .bg-1 { background:linear-gradient(135deg,#fce4ec,#f8bbd9); }
        .bg-2 { background:linear-gradient(135deg,#f3e5f5,#e1bee7); }

        /* Footer */
        .gallery-footer {
            padding:.9rem 2.5rem;
            background:rgba(255,245,247,.85); backdrop-filter:blur(12px);
            border-top:1px solid #f4c2ce44;
            font-size:.75rem; color:var(--dusty); letter-spacing:.05em; text-align:center;
            flex-shrink: 0;
        }

        @keyframes fadeUp { to { opacity:1; transform:translateY(0) scale(1); } }

        @media (max-width:540px) {
            .nav { padding:1rem 1.2rem; }
            .gallery-body { padding:1.5rem 1.2rem 2rem; }
            .album-grid { grid-template-columns:1fr 1fr; gap:.9rem; }
        }
    </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="curtain" id="curtain"></div>

<nav class="nav">
    <div class="nav-logo">Galeri <span>Aisha</span></div>
    <div class="nav-actions">
        <button class="logout-btn" id="logoutBtn">Keluar ↗</button>
    </div>
</nav>

<div class="gallery-body">
    <div class="gallery-header">
        <h2>Koleksi Album</h2>
        <p>2 album tersimpan · terakhir diperbarui 6 Juni 2026</p>
        <div class="header-line"></div>
    </div>

    <div class="album-grid">
        <div class="album-card" id="card-graduation">
            <div class="album-thumb bg-1">
                📸
                <div class="album-thumb-overlay"><span>Buka Album</span></div>
            </div>
            <div class="album-info">
                <h3>Graduation</h3>
                <p>4 foto · 22 April 2026</p>
            </div>
        </div>
        <div class="album-card" id="card-photobox">
            <div class="album-thumb bg-2">
                🌸
                <div class="album-thumb-overlay"><span>Buka Album</span></div>
            </div>
            <div class="album-info">
                <h3>Photobox</h3>
                <p>6 foto · 6 Juni 2026</p>
            </div>
        </div>
        <div class="album-card" id="card-roblox">
            <div class="album-thumb bg-2">
                🎮
                <div class="album-thumb-overlay"><span>Buka Album</span></div>
            </div>
            <div class="album-info">
                <h3>Roblox</h3>
                <p>6 foto · 6 Juni 2026</p>
            </div>
        </div>
    </div>
</div>

<footer class="gallery-footer">
    Galeri Pribadi
</footer>

<script>
    // Auth check
    if (localStorage.getItem("login") !== "true") window.location.href = "index.html";

    // Custom cursor
    const cursor = document.getElementById("cursor");
    const ring   = document.getElementById("cursorRing");
    let mx=0, my=0, rx=0, ry=0;

    document.addEventListener("mousemove", e => {
        mx = e.clientX; my = e.clientY;
        cursor.style.left = mx + "px"; cursor.style.top = my + "px";
    });
    (function loop() {
        rx += (mx - rx) * .12; ry += (my - ry) * .12;
        ring.style.left = rx + "px"; ring.style.top = ry + "px";
        requestAnimationFrame(loop);
    })();

    document.querySelectorAll("button, .album-card").forEach(el => {
        el.addEventListener("mouseenter", () => { ring.style.width="52px"; ring.style.height="52px"; ring.style.borderColor="var(--rose)"; });
        el.addEventListener("mouseleave", () => { ring.style.width="36px"; ring.style.height="36px"; ring.style.borderColor="var(--blush)"; });
    });

    // Curtain open on page load (datang dari splash)
    window.addEventListener("DOMContentLoaded", () => {
        const curtain = document.getElementById("curtain");
        curtain.classList.add("opening");
        setTimeout(() => {
            curtain.style.display = "none";
        }, 700);
    });

    // Navigasi ke album dengan curtain
    function goTo(url) {
        const curtain = document.getElementById("curtain");
        curtain.style.display = "block";
        curtain.classList.add("closing");
        setTimeout(() => { window.location.href = url; }, 540);
    }

    // Album cards
    document.getElementById("card-graduation").addEventListener("click", () => goTo("graduation.html"));
    document.getElementById("card-photobox").addEventListener("click",   () => goTo("photobox.html"));
    document.getElementById("card-roblox").addEventListener("click",   () => goTo("roblox.html"));

    // Logout dengan curtain
    document.getElementById("logoutBtn").addEventListener("click", () => {
        const curtain = document.getElementById("curtain");
        curtain.style.display = "block";
        curtain.classList.add("closing");
        setTimeout(() => {
            localStorage.removeItem("login");
            window.location.href = "index.html";
        }, 540);
    });
</script>
</body>
</html>
