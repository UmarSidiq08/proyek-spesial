<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Aisha</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rose: #e8738a;
            --rose-lt: #f2a4b4;
            --blush: #fce8ed;
            --petal: #fdf2f5;
            --cream: #fff8fa;
            --mauve: #c9697e;
            --soft: rgba(232, 115, 138, .12);
            --ink: #3a1f27;
            --muted: rgba(58, 31, 39, .45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            font-family: 'Jost', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HERO HEADER — full width ── */
        .hero {
            position: relative;
            background: linear-gradient(160deg, #fce8ed 0%, #fdf0f3 45%, #f9e0e8 100%);
            padding: 2.8rem 2.5rem 2rem;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 115, 138, .25) 0%, transparent 70%);
            top: -80px;
            right: -60px;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(242, 164, 180, .3) 0%, transparent 70%);
            bottom: -40px;
            left: 10%;
            pointer-events: none;
        }

        .hero-eyebrow {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .7rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--rose);
            margin-bottom: 1rem;
        }

        .hero-eyebrow::before,
        .hero-eyebrow::after {
            content: '';
            height: 1px;
            width: 28px;
            background: var(--rose-lt);
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--ink);
            position: relative;
            z-index: 1;
        }

        .hero-title em {
            font-style: italic;
            color: var(--rose);
        }

        .hero-meta {
            display: flex;
            gap: 1.4rem;
            margin-top: 1.1rem;
            flex-wrap: wrap;
        }

        .hero-meta-item {
            display: flex;
            align-items: center;
            gap: .38rem;
            font-size: .78rem;
            color: var(--muted);
            letter-spacing: .03em;
        }

        .hero-meta-item .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--rose-lt);
            flex-shrink: 0;
        }

        /* ── DIVIDER — full width ── */
        .divider {
            display: flex;
            align-items: center;
            gap: .8rem;
            padding: 0 2.5rem;
            margin: 1.6rem 0 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--rose-lt), transparent);
        }

        .divider-icon {
            width: 28px;
            height: 28px;
            background: var(--blush);
            border-radius: 50%;
            border: 1px solid var(--rose-lt);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
        }

        /* ── GALLERY WRAP — full width, foto di tengah & dibatasi ── */
        .gallery-wrap {
            padding: 1.6rem 2.5rem 2rem;
            display: flex;
            justify-content: center;
        }

        /* kontainer foto: max 560px di desktop, full di HP */
        .gallery-inner {
            width: 100%;
            max-width: 560px;
            position: relative;
        }

        .slideshow {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(232, 115, 138, .18), 0 2px 8px rgba(232, 115, 138, .1);
            background: var(--blush);
            aspect-ratio: 4/3;
            max-height: 60vh;
            /* tidak lebih tinggi dari 60% tinggi layar */
            cursor: grab;
            user-select: none;
        }

        .slideshow.dragging {
            cursor: grabbing;
        }

        .slides-track {
            display: flex;
            height: 100%;
            transition: transform .52s cubic-bezier(.77, 0, .18, 1);
        }

        .slides-track.no-transition {
            transition: none;
        }

        .slide {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            border-radius: 4px;
        }

        .slide-ornament {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            opacity: .35;
        }

        .slide-ornament.tl {
            top: 12px;
            left: 12px;
            border-top: 2px solid var(--rose);
            border-left: 2px solid var(--rose);
            border-radius: 4px 0 0 0;
        }

        .slide-ornament.br {
            bottom: 12px;
            right: 12px;
            border-bottom: 2px solid var(--rose);
            border-right: 2px solid var(--rose);
            border-radius: 0 0 4px 0;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, .82);
            border: 1px solid rgba(232, 115, 138, .3);
            color: var(--rose);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, box-shadow .2s, transform .2s;
            z-index: 10;
            box-shadow: 0 2px 12px rgba(232, 115, 138, .15);
            backdrop-filter: blur(6px);
        }

        .arrow:hover {
            background: rgba(255, 255, 255, .97);
            box-shadow: 0 4px 20px rgba(232, 115, 138, .28);
            transform: translateY(-50%) scale(1.08);
        }

        .arrow-prev {
            left: 1rem;
        }

        .arrow-next {
            right: 1rem;
        }

        .counter {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, .75);
            border: 1px solid rgba(232, 115, 138, .2);
            backdrop-filter: blur(8px);
            padding: .28rem .7rem;
            border-radius: 100px;
            font-size: .72rem;
            color: var(--rose);
            letter-spacing: .08em;
            z-index: 10;
        }

        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem 1.4rem 1rem;
            background: linear-gradient(to top, rgba(232, 115, 138, .35) 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }

        .caption-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.15rem;
            font-weight: 400;
            color: #fff;
            text-shadow: 0 1px 8px rgba(180, 60, 80, .3);
        }

        .caption-sub {
            font-size: .7rem;
            color: rgba(255, 255, 255, .75);
            margin-top: .1rem;
            letter-spacing: .07em;
        }

        /* ── PROGRESS — full width ── */
        .progress {
            height: 3px;
            background: rgba(232, 115, 138, .12);
            overflow: hidden;
            margin: 0 2.5rem;
            border-radius: 100px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--rose-lt), var(--rose));
            border-radius: 100px;
        }

        /* ── BOTTOM BAR — full width ── */
        .bottom-bar {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: 1rem 2.5rem 1.4rem;
        }

        .dots {
            display: flex;
            gap: .45rem;
            align-items: center;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .dots::-webkit-scrollbar {
            display: none;
        }

        .dot {
            flex-shrink: 0;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(232, 115, 138, .25);
            cursor: pointer;
            transition: background .25s, transform .25s;
        }

        .dot.active {
            background: var(--rose);
            transform: scale(1.5);
        }

        .ctrl-btn {
            flex-shrink: 0;
            background: white;
            border: 1px solid rgba(232, 115, 138, .3);
            color: var(--rose);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: .78rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, border-color .2s, box-shadow .2s;
            box-shadow: 0 2px 8px rgba(232, 115, 138, .1);
        }

        .ctrl-btn:hover {
            background: var(--blush);
            border-color: var(--rose);
            box-shadow: 0 3px 14px rgba(232, 115, 138, .22);
        }

        .ctrl-btn.on {
            background: var(--rose);
            color: white;
            border-color: var(--rose);
        }

        .speed-label {
            font-size: .7rem;
            color: var(--rose-lt);
            letter-spacing: .04em;
            flex-shrink: 0;
            min-width: 1.8rem;
            text-align: center;
        }

        .detail-btn {
            flex-shrink: 0;
            background: white;
            border: 1px solid rgba(232, 115, 138, .35);
            color: var(--rose);
            padding: .38rem 1rem;
            border-radius: 100px;
            font-family: 'Jost', sans-serif;
            font-size: .74rem;
            letter-spacing: .04em;
            cursor: pointer;
            transition: background .2s, box-shadow .2s;
            box-shadow: 0 2px 8px rgba(232, 115, 138, .1);
        }

        .detail-btn:hover {
            background: var(--blush);
            box-shadow: 0 4px 16px rgba(232, 115, 138, .2);
        }

        /* ── DETAIL PANEL ── */
        .detail-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--cream);
            border-top: 1px solid rgba(232, 115, 138, .2);
            border-radius: 22px 22px 0 0;
            padding: 1.6rem 2rem 2rem;
            z-index: 100;
            transition: bottom .38s cubic-bezier(.77, 0, .18, 1);
            max-height: 62vh;
            overflow-y: auto;
            box-shadow: 0 -8px 40px rgba(232, 115, 138, .15);
        }

        .detail-panel.open {
            bottom: 0;
        }

        .panel-handle {
            width: 38px;
            height: 4px;
            background: rgba(232, 115, 138, .25);
            border-radius: 2px;
            margin: 0 auto 1.4rem;
        }

        .panel-img-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: .25rem;
        }

        .panel-row {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-top: .85rem;
        }

        .panel-tag {
            padding: .3rem .8rem;
            background: var(--blush);
            border: 1px solid rgba(232, 115, 138, .2);
            border-radius: 8px;
            font-size: .75rem;
            color: var(--muted);
        }

        .panel-tag span {
            color: var(--ink);
        }

        .panel-note {
            margin-top: 1rem;
            width: 100%;
            background: white;
            border: 1px solid rgba(232, 115, 138, .25);
            border-radius: 12px;
            padding: .75rem 1rem;
            color: var(--ink);
            font-family: 'Jost', sans-serif;
            font-size: .84rem;
            resize: vertical;
            min-height: 70px;
            outline: none;
            transition: border-color .2s;
        }

        .panel-note:focus {
            border-color: var(--rose);
        }

        .panel-note::placeholder {
            color: var(--rose-lt);
        }

        .panel-close {
            position: absolute;
            top: 1.1rem;
            right: 1.4rem;
            background: var(--blush);
            border: 1px solid rgba(232, 115, 138, .2);
            color: var(--rose);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: .9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(58, 31, 39, .28);
            backdrop-filter: blur(2px);
        }

        .overlay.show {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .hero {
            animation: fadeUp .55s ease both;
        }

        .gallery-wrap {
            animation: fadeUp .65s .1s ease both;
        }
    </style>
</head>

<body>

    <script>
        const PHOTOS = [
            {
                src: "graduation/foto1.jpeg",
                caption: "Lulus",
                date: "22 April 2026",
                desc: "Foto kelulusan."
            },
            {
                src: "graduation/foto2.jpeg",
                caption: "Lulus",
                date: "22 April 2026",
                desc: "Foto kelulusan."
            },
            {
                src: "graduation/foto3.jpeg",
                caption: "Lulus",
                date: "22 April 2026",
                desc: "Foto kelulusan."
            },
            {
                src: "graduation/foto4.jpeg",
                caption: "Lulus",
                date: "22 April 2026",
                desc: "Foto kelulusan."
            },

        ];
        const AUTOPLAY_SPEEDS = [3, 5, 8];
    </script>

    <!-- HERO: full width -->
    <div class="hero">
        <div class="hero-eyebrow">✦ Koleksi Foto ✦</div>
        <h1 class="hero-title">Galeri <em>Aisha</em></h1>
        <div class="hero-meta">
            <div class="hero-meta-item"><span class="dot"></span> 4 Foto</div>
            <div class="hero-meta-item"><span class="dot"></span> 22 April 2026</div>
            <div class="hero-meta-item"><span class="dot"></span> Wisuda</div>
        </div>

    </div>


    <!-- DIVIDER: full width -->
    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon">✿</div>
        <div class="divider-line"></div>
    </div>

    <!-- GALLERY: full width, foto di-center & dibatasi max-width -->
    <div class="gallery-wrap">
        <div class="gallery-inner">
            <div class="slideshow" id="slideshow">
                <div class="slides-track" id="track"></div>
                <div class="slide-ornament tl"></div>
                <div class="slide-ornament br"></div>
                <button class="arrow arrow-prev" onclick="go(-1)">&#8592;</button>
                <button class="arrow arrow-next" onclick="go(1)">&#8594;</button>
                <div class="counter" id="counter"></div>
                <div class="caption" id="caption"></div>
            </div>
        </div>
    </div>
    <div style="padding: 1rem 2.5rem; display: flex; align-items: center;">
        <a href="dashboard.html" style="
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: white;
        border: 1px solid rgba(232, 115, 138, .3);
        color: var(--rose);
        padding: 0.5rem 1.2rem;
        border-radius: 100px;
        font-family: 'Jost', sans-serif;
        font-size: 0.78rem;
        letter-spacing: 0.04em;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(232, 115, 138, .1);
    " onmouseover="this.style.background='var(--blush)'; this.style.boxShadow='0 4px 16px rgba(232, 115, 138, .2)';"
            onmouseout="this.style.background='white'; this.style.boxShadow='0 2px 8px rgba(232, 115, 138, .1)';">
            ← Kembali
        </a>
    </div>

    <!-- PROGRESS: full width -->
    <div class="progress">
        <div class="progress-fill" id="pfill"></div>
    </div>

    <!-- BOTTOM BAR: full width -->
    <div class="bottom-bar">
        <div class="dots" id="dots"></div>
        <span class="speed-label" id="speedLbl"></span>
        <button class="ctrl-btn" id="fasterBtn" onclick="changeSpeed(-1)" title="Lebih cepat">▲</button>
        <button class="ctrl-btn" id="slowerBtn" onclick="changeSpeed(1)" title="Lebih lambat">▼</button>
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()" title="Autoplay">▶</button>
        <button class="detail-btn" onclick="togglePanel()">Detail</button>
    </div>

    <!-- DETAIL PANEL -->
    <div class="overlay" id="overlay" onclick="closePanel()"></div>
    <div class="detail-panel" id="panel">
        <div class="panel-handle"></div>
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div class="panel-img-name" id="pName"></div>
        <div class="panel-row" id="pTags"></div>
        <textarea class="panel-note" id="pNote" placeholder="Catatan untuk foto ini…"></textarea>
    </div>

    <script>
        let cur = 0, playing = false, speedIdx = 1, progAnimId = null, progStart = null;
        const notes = PHOTOS.map(() => '');
        const track = document.getElementById('track');
        const dotsEl = document.getElementById('dots');
        const counterEl = document.getElementById('counter');
        const captionEl = document.getElementById('caption');
        const pfill = document.getElementById('pfill');
        const playBtn = document.getElementById('playBtn');
        const speedLbl = document.getElementById('speedLbl');
        const panel = document.getElementById('panel');
        const overlay = document.getElementById('overlay');
        const slideshow = document.getElementById('slideshow');

        PHOTOS.forEach((p, i) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            const img = document.createElement('img');
            img.src = p.src; img.alt = p.caption;
            slide.appendChild(img);
            track.appendChild(slide);
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.onclick = () => goTo(i);
            dotsEl.appendChild(dot);
        });

        speedLbl.textContent = AUTOPLAY_SPEEDS[speedIdx] + 's';

        function goTo(idx) {
            cur = ((idx % PHOTOS.length) + PHOTOS.length) % PHOTOS.length;
            track.style.transform = `translateX(-${cur * 100}%)`;
            dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
            counterEl.textContent = `${cur + 1} / ${PHOTOS.length}`;
            const p = PHOTOS[cur];
            captionEl.innerHTML = `<div class="caption-title">${p.caption}</div><div class="caption-sub">${p.date}</div>`;
            resetProgress();
        }
        function go(dir) { goTo(cur + dir); if (playing) animateProgress(); }

        let dragX = null;
        slideshow.addEventListener('pointerdown', e => { dragX = e.clientX; slideshow.classList.add('dragging'); });
        slideshow.addEventListener('pointermove', e => {
            if (dragX === null) return;
            track.classList.add('no-transition');
            track.style.transform = `translateX(${-(cur * slideshow.offsetWidth) - (e.clientX - dragX)}px)`;
        });
        slideshow.addEventListener('pointerup', e => {
            if (dragX === null) return;
            const dx = e.clientX - dragX;
            track.classList.remove('no-transition');
            slideshow.classList.remove('dragging');
            if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1); else goTo(cur);
            dragX = null;
        });
        slideshow.addEventListener('pointercancel', () => { track.classList.remove('no-transition'); slideshow.classList.remove('dragging'); goTo(cur); dragX = null; });

        document.addEventListener('keydown', e => {
            if (panel.classList.contains('open')) return;
            if (e.key === 'ArrowLeft') go(-1);
            if (e.key === 'ArrowRight') go(1);
            if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });

        function resetProgress() { if (progAnimId) cancelAnimationFrame(progAnimId); pfill.style.width = '0%'; }
        function animateProgress() {
            if (progAnimId) cancelAnimationFrame(progAnimId);
            const dur = AUTOPLAY_SPEEDS[speedIdx] * 1000;
            progStart = performance.now();
            function step(now) { const pct = Math.min((now - progStart) / dur * 100, 100); pfill.style.width = pct + '%'; if (pct < 100) progAnimId = requestAnimationFrame(step); else go(1); }
            progAnimId = requestAnimationFrame(step);
        }
        function togglePlay() { playing = !playing; playBtn.classList.toggle('on', playing); playBtn.textContent = playing ? '⏸' : '▶'; if (playing) animateProgress(); else resetProgress(); }
        function changeSpeed(dir) { speedIdx = Math.max(0, Math.min(AUTOPLAY_SPEEDS.length - 1, speedIdx + dir)); speedLbl.textContent = AUTOPLAY_SPEEDS[speedIdx] + 's'; if (playing) { resetProgress(); animateProgress(); } }

        function togglePanel() { panel.classList.contains('open') ? closePanel() : openPanel(); }
        function openPanel() {
            const p = PHOTOS[cur];
            document.getElementById('pName').textContent = p.caption;
            document.getElementById('pTags').innerHTML =
                `<div class="panel-tag">Tanggal: <span>${p.date}</span></div>
       <div class="panel-tag">No.: <span>${cur + 1} / ${PHOTOS.length}</span></div>
       <div class="panel-tag">File: <span>${p.src}</span></div>
       ${p.desc ? `<div class="panel-tag" style="width:100%">${p.desc}</div>` : ''}`;
            const noteEl = document.getElementById('pNote');
            noteEl.value = notes[cur];
            noteEl.oninput = () => { notes[cur] = noteEl.value; };
            panel.classList.add('open');
            overlay.classList.add('show');
        }
        function closePanel() { panel.classList.remove('open'); overlay.classList.remove('show'); }

        goTo(0);
    </script>
</body>

</html>
